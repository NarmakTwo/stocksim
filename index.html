<!DOCTYPE html>
<html>

<head>
  <title>Advanced Stock Market Simulator</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Carlito:ital,wght@0,400;0,700;1,400;1,700&display=swap');
    @import url('https://fonts.googleapis.com/css2?family=Roboto+Mono:ital,wght@0,100..700;1,100..700&display=swap');

    .carlito-regular {
      font-family: "Carlito", sans-serif;
      font-weight: 400;
      font-style: normal;
    }

    .carlito-bold {
      font-family: "Carlito", sans-serif;
      font-weight: 700;
      font-style: normal;
    }

    .carlito-regular-italic {
      font-family: "Carlito", sans-serif;
      font-weight: 400;
      font-style: italic;
    }

    .carlito-bold-italic {
      font-family: "Carlito", sans-serif;
      font-weight: 700;
      font-style: italic;
    }

    .roboto-mono-regular {
      font-family: "Roboto Mono", monospace;
      font-optical-sizing: auto;
      font-weight: 400;
      font-style: normal;
    }

    #user-balance,
    #user-debt,
    #total-balance,
    #credit-score,
    .stock-price,
    .stock-change,
    .stock-owned,
    .stock-header h3,
    .stock-header span {
      font-family: "Roboto Mono", monospace;
    }

    body {
      font-family: "Carlito", Arial, sans-serif;
      margin: 0;
      padding: 20px;
      background-color: #f0f0f0;
    }

    #app {
      max-width: 1200px;
      margin: 0 auto;
      background-color: white;
      box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
      border-radius: 8px;
      padding: 20px;
    }

    .header {
      text-align: center;
      margin-bottom: 20px;
    }

    #user-info {
      display: flex;
      justify-content: space-between;
      margin-bottom: 20px;
      padding: 15px;
      background-color: #e9ecef;
      border-radius: 8px;
      flex-wrap: wrap;
      gap: 10px;
    }

    .tab-container {
      display: flex;
      gap: 10px;
      margin-bottom: 20px;
    }

    .tab-button {
      padding: 10px 20px;
      border: none;
      border-radius: 5px;
      cursor: pointer;
      background-color: #e9ecef;
      transition: background-color 0.3s;
    }

    .tab-button.active {
      background-color: #007bff;
      color: white;
    }

    .stock-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
      gap: 20px;
      margin-bottom: 20px;
    }

    .stock-card {
      border: 1px solid #ddd;
      border-radius: 8px;
      padding: 15px;
      background-color: white;
      transition: transform 0.2s;
      height: 300px;
      display: flex;
      flex-direction: column;
    }

    .stock-card:hover {
      transform: translateY(-2px);
      box-shadow: 0 4px 8px rgba(0, 0, 0, 0.1);
    }

    .stock-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 10px;
    }

    .stock-price {
      font-size: 1.2em;
      font-weight: bold;
      margin: 10px 0;
    }

    .stock-change {
      font-size: 0.9em;
      margin: 5px 0;
    }

    .stock-owned {
      font-size: 0.9em;
      color: #666;
      margin: 5px 0;
    }

    .positive {
      color: #28a745;
    }

    .negative {
      color: #dc3545;
    }

    .chart-container {
      flex: 1;
      position: relative;
      min-height: 100px;
      width: 100%;
    }

    .stock-chart {
      position: absolute;
      width: 100% !important;
      height: 100% !important;
    }

    .stock-actions {
      display: flex;
      justify-content: space-between;
      margin-top: auto;
      padding-top: 10px;
    }

    .action-group {
      display: flex;
      gap: 5px;
      align-items: center;
    }

    .max-btn {
      padding: 4px 8px;
      font-size: 0.8em;
    }

    button {
      padding: 8px 16px;
      border: none;
      border-radius: 4px;
      cursor: pointer;
      transition: background-color 0.3s;
    }

    .buy-btn {
      background-color: #28a745;
      color: white;
    }

    .buy-btn:hover {
      background-color: #218838;
    }

    .sell-btn {
      background-color: #dc3545;
      color: white;
    }

    .sell-btn:hover {
      background-color: #c82333;
    }



    /* Settings button and menu */
    .settings-btn {
      position: absolute;
      top: 20px;
      left: 20px;
      background: none;
      border: none;
      font-size: 24px;
      cursor: pointer;
      z-index: 1000;
    }

    .settings-menu {
      display: none;
      position: absolute;
      top: 60px;
      left: 20px;
      background: white;
      border: 1px solid #ddd;
      border-radius: 8px;
      padding: 15px;
      box-shadow: 0 4px 8px rgba(0, 0, 0, 0.1);
      z-index: 1000;
    }

    .settings-menu.show {
      display: block;
    }

    /* Dark mode styles */
    body.dark-mode {
      background-color: #0b0f19;
      color: #e5e7eb;
    }

    body.dark-mode #app {
      background-color: #111827;
      box-shadow: 0 0 15px rgba(0, 0, 0, 0.5);
    }

    body.dark-mode #user-info,
    body.dark-mode .tab-button {
      background-color: #1f2937;
      color: #e5e7eb;
      border: none;
    }

    body.dark-mode .stock-card,
    body.dark-mode .settings-menu {
      background-color: #1f2937;
      border-color: #374151;
      color: #e5e7eb;
    }

    body.dark-mode .tab-button.active {
      background-color: #3b82f6;
      color: white;
    }

    .settings-divider {
      margin-top: 15px;
      padding-top: 15px;
      border-top: 1px solid #ddd;
    }

    body.dark-mode .settings-divider {
      border-top-color: #374151;
    }

    .crash-toast {
      position: fixed;
      top: 20px;
      left: 50%;
      transform: translateX(-50%);
      background-color: #dc3545;
      color: white;
      padding: 15px 30px;
      border-radius: 8px;
      font-size: 18px;
      font-weight: bold;
      z-index: 2000;
      box-shadow: 0 4px 12px rgba(220, 53, 69, 0.4);
      opacity: 0;
      visibility: hidden;
      transition: opacity 0.5s ease-in-out, visibility 0.5s ease-in-out, transform 0.5s cubic-bezier(0.68, -0.55, 0.265, 1.55);
      margin-top: -20px;
    }

    .crash-toast.show {
      opacity: 1;
      visibility: visible;
      margin-top: 0;
    }
  </style>
</head>

<body>
  <div id="crash-toast" class="crash-toast">uh-oh! market crash D:</div>
  <button id="settings-btn" class="settings-btn">⚙️</button>
  <div id="settings-menu" class="settings-menu">
    <h3 style="margin-top: 0;">Settings</h3>
    <label style="cursor: pointer; display: flex; align-items: center; gap: 8px; margin-bottom: 5px;">
      <input type="checkbox" id="theme-toggle"> Dark Mode
    </label>
    <label style="cursor: pointer; display: flex; align-items: center; gap: 8px;">
      <input type="checkbox" id="gambling-toggle"> Enable Gambling Section
    </label>
    <div class="settings-divider" style="display: flex; flex-direction: column; gap: 10px;">
      <button id="reset-settings-btn" style="background-color: #6c757d; color: white;">Reset Settings</button>
      <button id="clear-cache-btn" style="background-color: #dc3545; color: white;">Clear Game Cache</button>
    </div>
  </div>

  <div id="app">
    <div class="header">
      <h1>Advanced Stock Market Simulator</h1>
      <div id="user-info">
        <span>Balance: $<span id="user-balance">10000.00</span></span>
        <span>Debt: $<span id="user-debt">0.00</span></span>
        <span>Net Worth: $<span id="total-balance">10000.00</span></span>
        <span>Credit Score: <span id="credit-score">750</span></span>
      </div>
    </div>

    <div class="tab-container">
      <button class="tab-button active" data-tab="growth">Growth Stocks</button>
      <button class="tab-button" data-tab="stable">Stable Stocks</button>
      <button class="tab-button" id="gambling-tab-btn" data-tab="gambling" style="display: none;">Gambling</button>
    </div>

    <div id="growth-stocks" class="stock-grid"></div>
    <div id="stable-stocks" class="stock-grid" style="display: none;"></div>
    <div id="gambling-stocks" class="stock-grid" style="display: none;"></div>
  </div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/3.7.0/chart.min.js"></script>
  <script>
    let userBalance = 10000;
    let userDebt = 0;
    let creditScore = 750;
    let stocksOwned = {};
    let stockPurchasePrices = {};
    let charts = {};
    let currentTab = 'growth';

    const growthStocks = [
      { symbol: 'AAPL', name: 'Apple Inc.', price: 150.25, volatility: 0.12 },
      { symbol: 'GOOGL', name: 'Alphabet Inc.', price: 2750.80, volatility: 0.15 },
      { symbol: 'TSLA', name: 'Tesla Inc.', price: 735.90, volatility: 0.25 },
      { symbol: 'NVDA', name: 'NVIDIA Corporation', price: 280.75, volatility: 0.20 },
      { symbol: 'NFLX', name: 'Netflix Inc.', price: 540.60, volatility: 0.18 },
      { symbol: 'AMZN', name: 'Amazon.com Inc.', price: 3200.50, volatility: 0.17 },
      { symbol: 'FB', name: 'Meta Platforms Inc.', price: 330.15, volatility: 0.16 },
      { symbol: 'AMD', name: 'Advanced Micro Devices', price: 120.80, volatility: 0.22 },
      { symbol: 'UBER', name: 'Uber Technologies Inc.', price: 45.30, volatility: 0.23 },
      { symbol: 'SQ', name: 'Square Inc.', price: 220.75, volatility: 0.24 },
      { symbol: 'SHOP', name: 'Shopify Inc.', price: 1450.60, volatility: 0.26 },
      { symbol: 'ROKU', name: 'Roku Inc.', price: 330.40, volatility: 0.28 },
      { symbol: 'ZM', name: 'Zoom Video Communications', price: 280.90, volatility: 0.27 },
      { symbol: 'PYPL', name: 'PayPal Holdings Inc.', price: 270.30, volatility: 0.19 },
      { symbol: 'TWLO', name: 'Twilio Inc.', price: 350.20, volatility: 0.21 }
    ];

    const stableStocks = [
      { symbol: 'SPY', name: 'S&P 500 ETF', price: 450.75, volatility: 0.05 },
      { symbol: 'VTI', name: 'Vanguard Total Market', price: 220.40, volatility: 0.04 },
      { symbol: 'KDP', name: 'Keurig Dr Pepper Inc.', price: 137, volatility: 0.03 },
      { symbol: 'JNJ', name: 'Johnson & Johnson', price: 170.50, volatility: 0.06 },
      { symbol: 'PG', name: 'Procter & Gamble', price: 140.85, volatility: 0.05 },
      { symbol: 'KO', name: 'Coca-Cola Company', price: 55.30, volatility: 0.04 },
      { symbol: 'WMT', name: 'Walmart Inc.', price: 145.70, volatility: 0.05 },
      { symbol: 'MCD', name: "McDonald's Corporation", price: 250.60, volatility: 0.06 },
      { symbol: 'VZ', name: 'Verizon Communications', price: 55.80, volatility: 0.04 },
      { symbol: 'PEP', name: 'PepsiCo Inc.', price: 150.20, volatility: 0.05 },
      { symbol: 'DIS', name: 'The Walt Disney Company', price: 180.30, volatility: 0.07 },
      { symbol: 'XOM', name: 'Exxon Mobil Corporation', price: 60.40, volatility: 0.06 },
      { symbol: 'CVX', name: 'Chevron Corporation', price: 110.90, volatility: 0.06 },
      { symbol: 'UNH', name: 'UnitedHealth Group', price: 410.50, volatility: 0.05 },
      { symbol: 'HD', name: 'The Home Depot', price: 330.80, volatility: 0.06 },
      { symbol: 'COST', name: 'Costco Wholesale', price: 450.70, volatility: 0.05 }
    ];

    // Procedural Noise Functions
    function hashString(str) {
      let hash = 0;
      for (let i = 0; i < str.length; i++) {
        hash = ((hash << 5) - hash) + str.charCodeAt(i);
        hash |= 0;
      }
      return hash;
    }

    function hash(n) {
      let h = Math.sin(n * 12.9898 + 78.233) * 43758.5453123;
      return (h - Math.floor(h)) * 2.0 - 1.0;
    }

    function lerp(a, b, t) {
      return a + t * (b - a);
    }

    function noise1D(x) {
      const i = Math.floor(x);
      const f = x - i;
      const u = f * f * (3.0 - 2.0 * f);
      return lerp(hash(i), hash(i + 1), u);
    }

    function fbm(x, octaves) {
      let v = 0;
      let a = 0.5;
      let shift = 100.0;
      for (let i = 0; i < octaves; ++i) {
        v += a * noise1D(x);
        x = x * 2.0 + shift;
        a *= 0.5;
      }
      return v;
    }

    let globalMarketState = {
      crashMultiplier: 1.0,
      nextCrashTime: Date.now() + (10 + Math.random() * 10) * 60 * 1000
    };

    function calculateStockPrice(stock, timeMs) {
      const timeSec = timeMs / 1000;
      const seed = hashString(stock.symbol);
      const noiseTime = timeSec * 0.05 + seed;
      const noiseVal = fbm(noiseTime, 4);
      
      // 1. Remove the old 'drift = 1 + timeSec' line entirely.
    
      // 2. Add a constant 'bias' here (e.g., 0.15).
      // This shifts the random wave so it's centered slightly positive.
      const bias = 0.15; 
      const fluctuation = Math.exp((noiseVal + bias) * stock.volatility * 3);
      
      // 3. Return the price without the time-based multiplier.
      return stock.initialPrice * fluctuation * globalMarketState.crashMultiplier;
    }

    // Load saved game or initialize
    const savedState = localStorage.getItem('stocksim_game_save');
    let loadedState = null;
    if (savedState) {
      try {
        loadedState = JSON.parse(savedState);
        userBalance = loadedState.userBalance !== undefined ? loadedState.userBalance : 10000;
        userDebt = loadedState.userDebt !== undefined ? loadedState.userDebt : 0;
        creditScore = loadedState.creditScore !== undefined ? loadedState.creditScore : 750;
        if (loadedState.stocksOwned) stocksOwned = loadedState.stocksOwned;
        if (loadedState.stockPurchasePrices) stockPurchasePrices = loadedState.stockPurchasePrices;
        if (loadedState.globalMarketState) globalMarketState = loadedState.globalMarketState;
      } catch (e) {
        console.error("Error loading save", e);
      }
    }

    [...growthStocks, ...stableStocks].forEach(stock => {
      stock.initialPrice = stock.price;

      if (stock.symbol === 'KDP' && loadedState && loadedState.stocks && loadedState.stocks['KDP']) {
        let savedPrice = loadedState.stocks['KDP'].price;
        const history = loadedState.stocks['KDP'].history;
        const lastTime = history && history.length > 0 ? history[history.length - 1].time : Date.now();
        const ticksPassed = Math.max(0, Math.floor((Date.now() - lastTime) / 5000));

        savedPrice += ticksPassed * 5.05; // 5.05 is the average of 0.1 to 10

        stock.history = Array(20).fill(0).map((_, i) => {
          const timeOffset = Date.now() - (19 - i) * 5000;
          const p = savedPrice - (19 - i) * 5.05;
          return { time: timeOffset, price: p };
        });
        stock.price = stock.history[19].price;
        stock.change = stock.history[19].price - stock.history[18].price;
      } else {
        // We overwrite history using the current time so it progresses seamlessly while offline
        stock.history = Array(20).fill(0).map((_, i) => {
          const timeOffset = Date.now() - (19 - i) * 5000;
          let p;
          if (stock.symbol === 'KDP') {
            p = stock.initialPrice + (i * 5.05); // Initial fake history
          } else {
            p = calculateStockPrice(stock, timeOffset);
          }
          return { time: timeOffset, price: p };
        });
        stock.price = stock.history[19].price;
        stock.change = stock.history[19].price - stock.history[18].price;
      }

      if (stocksOwned[stock.symbol] === undefined) stocksOwned[stock.symbol] = 0;
      if (stockPurchasePrices[stock.symbol] === undefined) stockPurchasePrices[stock.symbol] = 0;
    });

    function saveGame() {
      const gameState = {
        userBalance,
        userDebt,
        creditScore,
        stocksOwned,
        stockPurchasePrices,
        globalMarketState,
        stocks: {}
      };

      [...growthStocks, ...stableStocks].forEach(stock => {
        gameState.stocks[stock.symbol] = {
          price: stock.price,
          change: stock.change,
          history: stock.history
        };
      });

      localStorage.setItem('stocksim_game_save', JSON.stringify(gameState));
    }

    function updateMarketCrash() {
      const now = Date.now();
      if (now >= globalMarketState.nextCrashTime && globalMarketState.crashMultiplier >= 1.0) {
        globalMarketState.crashMultiplier = 0.3 + Math.random() * 0.4;
        globalMarketState.nextCrashTime = now + (10 + Math.random() * 10) * 60 * 1000;
        console.log("Market Crash! Next one at " + new Date(globalMarketState.nextCrashTime));

        const toast = document.getElementById('crash-toast');
        if (toast) {
          toast.classList.add('show');
          setTimeout(() => {
            toast.classList.remove('show');
          }, 5000);
        }
      }

      if (globalMarketState.crashMultiplier < 1.0) {
        globalMarketState.crashMultiplier += 0.01;
        if (globalMarketState.crashMultiplier > 1.0) {
          globalMarketState.crashMultiplier = 1.0;
        }
      }
    }

    function updateStockPrice(stock) {
      const oldPrice = stock.price;
    
      // REMOVED: The old "gain = 0.1 + Math.random() * 9.9" logic is gone.
      stock.price = calculateStockPrice(stock, Date.now());
    
      stock.change = stock.price - oldPrice;
      stock.history.push({ time: Date.now(), price: stock.price });
      if (stock.history.length > 20) stock.history.shift();
    }

    function renderStockCard(stock) {
      const owned = stocksOwned[stock.symbol] || 0;
      const purchasePrice = stockPurchasePrices[stock.symbol];
      const profitLoss = owned > 0 ? ((stock.price - purchasePrice) / purchasePrice) * 100 : 0;

      return `
        <div class="stock-card" id="card-${stock.symbol}">
          <div class="stock-header">
            <h3>${stock.symbol}</h3>
            <span>${stock.name}</span>
          </div>
          <div class="stock-price">$${stock.price.toFixed(2)}</div>
          <div class="stock-change ${stock.change >= 0 ? 'positive' : 'negative'}">
            ${stock.change >= 0 ? '▲' : '▼'} $${Math.abs(stock.change).toFixed(2)}
          </div>
          <div class="stock-owned">
            Owned: ${owned.toFixed(4)}
            ${owned > 0 ? ` (${profitLoss >= 0 ? '+' : ''}${profitLoss.toFixed(2)}%)` : ''}
          </div>
          <div class="chart-container">
            <canvas class="stock-chart" id="chart-${stock.symbol}"></canvas>
          </div>
          <div class="stock-actions">
            <div class="action-group">
              <button class="buy-btn" onclick="buyStock('${stock.symbol}')">Buy</button>
              <button class="buy-btn max-btn" onclick="buyMaxStock('${stock.symbol}')">Max</button>
            </div>
            <div class="action-group">
              <button class="sell-btn max-btn" onclick="sellMaxStock('${stock.symbol}')">Max</button>
              <button class="sell-btn" onclick="sellStock('${stock.symbol}')">Sell</button>
            </div>
          </div>
        </div>
      `;
    }

    function updateChart(stock) {
      const ctx = document.getElementById(`chart-${stock.symbol}`).getContext('2d');

      if (charts[stock.symbol]) {
        charts[stock.symbol].destroy();
      }

      charts[stock.symbol] = new Chart(ctx, {
        type: 'line',
        data: {
          labels: stock.history.map((h, i) => i),
          datasets: [{
            data: stock.history.map(h => h.price),
            borderColor: '#4CAF50',
            tension: 0.4,
            borderWidth: 2,
            pointRadius: 0
          }]
        },
        options: {
          responsive: true,
          maintainAspectRatio: false,
          plugins: { legend: { display: false } },
          scales: {
            x: { display: false },
            y: { display: false }
          },
          animation: false
        }
      });
    }

    function renderStocks() {
      let stocks = [];
      if (currentTab === 'growth') stocks = growthStocks;
      else if (currentTab === 'stable') stocks = stableStocks;

      const container = document.getElementById(`${currentTab}-stocks`);

      // Store scroll position
      const scrollPos = window.scrollY;

      // Update container HTML
      container.innerHTML = stocks.map(stock => renderStockCard(stock)).join('');

      // Restore scroll position
      window.scrollTo(0, scrollPos);

      // Update charts
      stocks.forEach(stock => updateChart(stock));
    }

    function updateStocks() {
      updateMarketCrash();

      // Update ALL stocks so background tabs stay accurate
      [...growthStocks, ...stableStocks].forEach(updateStockPrice);

      renderStocks();
      updateUserInfo();
      saveGame();
    }

    function buyStock(symbol, amount = null) {
      const stock = [...growthStocks, ...stableStocks].find(s => s.symbol === symbol);
      if (amount === null) amount = parseFloat(prompt(`Enter the amount to invest in ${symbol}:`, '100'));

      if (isNaN(amount) || amount <= 0) {
        alert("Invalid amount!");
        return;
      }

      if (amount > userBalance + 0.01) {
        alert("Insufficient funds!");
        return;
      }

      amount = Math.min(amount, userBalance);

      const sharesBought = amount / stock.price;
      userBalance -= amount;
      stocksOwned[symbol] = (stocksOwned[symbol] || 0) + sharesBought;

      if (stockPurchasePrices[symbol] === 0) {
        stockPurchasePrices[symbol] = stock.price;
      } else {
        // Update average purchase price
        const totalShares = stocksOwned[symbol];
        const totalCost = stockPurchasePrices[symbol] * (totalShares - sharesBought) + amount;
        stockPurchasePrices[symbol] = totalCost / totalShares;
      }

      updateUserInfo();
      renderStocks();
      saveGame();
    }

    function sellStock(symbol, amount = null) {
      const stock = [...growthStocks, ...stableStocks].find(s => s.symbol === symbol);
      const maxShares = stocksOwned[symbol] || 0;

      if (maxShares === 0) {
        alert("You don't own any shares!");
        return;
      }

      if (amount === null) amount = parseFloat(prompt(`Enter the number of shares to sell (max ${maxShares.toFixed(4)}):`, maxShares.toFixed(4)));

      if (isNaN(amount) || amount <= 0 || amount > maxShares + 0.0001) {
        alert("Invalid number of shares!");
        return;
      }

      amount = Math.min(amount, maxShares);

      const saleAmount = amount * stock.price;
      userBalance += saleAmount;
      stocksOwned[symbol] -= amount;

      if (stocksOwned[symbol] < 0.0001) {
        stocksOwned[symbol] = 0;
        stockPurchasePrices[symbol] = 0;
      }

      updateUserInfo();
      renderStocks();
      saveGame();
    }

    function buyMaxStock(symbol) {
      buyStock(symbol, userBalance);
    }

    function sellMaxStock(symbol) {
      const stock = [...growthStocks, ...stableStocks].find(s => s.symbol === symbol);
      sellStock(symbol, stocksOwned[symbol]);
    }

    function updateUserInfo() {
      document.getElementById('user-balance').textContent = userBalance.toFixed(2);
      document.getElementById('user-debt').textContent = userDebt.toFixed(2);

      // Calculate total value of stock portfolio
      let totalStockValue = 0;
      const allStocks = [...growthStocks, ...stableStocks];
      
      allStocks.forEach(stock => {
        const shares = stocksOwned[stock.symbol] || 0;
        totalStockValue += shares * stock.price;
      });

      // Net worth = Cash + Stock Value - Debt
      const netWorth = userBalance + totalStockValue - userDebt;
      document.getElementById('total-balance').textContent = netWorth.toFixed(2);
      
      document.getElementById('credit-score').textContent = creditScore;
    }

    // Tab switching
    document.querySelectorAll('.tab-button').forEach(button => {
      button.addEventListener('click', () => {
        document.querySelectorAll('.tab-button').forEach(btn => btn.classList.remove('active'));
        button.classList.add('active');
        document.getElementById('growth-stocks').style.display = 'none';
        document.getElementById('stable-stocks').style.display = 'none';
        document.getElementById('gambling-stocks').style.display = 'none';
        currentTab = button.dataset.tab;
        document.getElementById(`${currentTab}-stocks`).style.display = 'grid';
        renderStocks();
      });
    });

    // Initial render
    renderStocks();

    // Update prices every 5 seconds
    setInterval(updateStocks, 5000);

    // Settings and Theme logic
    const settingsBtn = document.getElementById('settings-btn');
    const settingsMenu = document.getElementById('settings-menu');
    const themeToggle = document.getElementById('theme-toggle');
    const gamblingToggle = document.getElementById('gambling-toggle');
    const gamblingTabBtn = document.getElementById('gambling-tab-btn');
    const resetSettingsBtn = document.getElementById('reset-settings-btn');
    const clearCacheBtn = document.getElementById('clear-cache-btn');

    // Load settings from localStorage
    const savedSettings = JSON.parse(localStorage.getItem('stocksim_settings') || '{}');
    if (savedSettings.darkMode) {
      document.body.classList.add('dark-mode');
      themeToggle.checked = true;
    }
    if (savedSettings.gamblingEnabled) {
      gamblingToggle.checked = true;
      gamblingTabBtn.style.display = 'inline-block';
    }

    settingsBtn.addEventListener('click', () => {
      settingsMenu.classList.toggle('show');
    });

    document.addEventListener('click', (e) => {
      if (!settingsBtn.contains(e.target) && !settingsMenu.contains(e.target)) {
        settingsMenu.classList.remove('show');
      }
    });

    themeToggle.addEventListener('change', (e) => {
      const isDarkMode = e.target.checked;
      if (isDarkMode) {
        document.body.classList.add('dark-mode');
      } else {
        document.body.classList.remove('dark-mode');
      }

      const currentSettings = JSON.parse(localStorage.getItem('stocksim_settings') || '{}');
      currentSettings.darkMode = isDarkMode;
      localStorage.setItem('stocksim_settings', JSON.stringify(currentSettings));
    });

    gamblingToggle.addEventListener('change', (e) => {
      const isEnabled = e.target.checked;
      if (isEnabled) {
        gamblingTabBtn.style.display = 'inline-block';
      } else {
        gamblingTabBtn.style.display = 'none';
        if (currentTab === 'gambling') {
          document.querySelector('.tab-button[data-tab="growth"]').click();
        }
      }

      const currentSettings = JSON.parse(localStorage.getItem('stocksim_settings') || '{}');
      currentSettings.gamblingEnabled = isEnabled;
      localStorage.setItem('stocksim_settings', JSON.stringify(currentSettings));
    });

    resetSettingsBtn.addEventListener('click', () => {
      if (confirm('Are you sure you want to reset settings to default?')) {
        localStorage.removeItem('stocksim_settings');
        document.body.classList.remove('dark-mode');
        themeToggle.checked = false;

        gamblingToggle.checked = false;
        gamblingTabBtn.style.display = 'none';
        if (currentTab === 'gambling') {
          document.querySelector('.tab-button[data-tab="growth"]').click();
        }

        settingsMenu.classList.remove('show');
      }
    });

    clearCacheBtn.addEventListener('click', () => {
      if (confirm('Are you sure you want to clear the game cache? This will reset all your progress!')) {
        // Clear game cache
        localStorage.removeItem('stocksim_game_save');

        // Reset to initial values
        userBalance = 10000;
        userDebt = 0;
        creditScore = 750;

        [...growthStocks, ...stableStocks].forEach(stock => {
          stocksOwned[stock.symbol] = 0;
          stockPurchasePrices[stock.symbol] = 0;
        });

        updateUserInfo();
        renderStocks();
        settingsMenu.classList.remove('show');
        alert('Game cache cleared! Progress has been reset.');
      }
    });
  </script>
</body>

</html>
