    function formatMassiveNumber(val, decimalPlaces = 2) {
      // 1. Setup and handle negative numbers
      const bigNum = BigInt(val);
      const absNum = bigNum < 0n ? -bigNum : bigNum;
      const sign = bigNum < 0n ? "-" : "";
    
      // 2. Numbers under 1 Million: Just return with commas
      if (absNum < 1000000n) {
        return sign + absNum.toLocaleString('en-US');
      }
    
      // 3. Determine the Tier (n). Every +1 is a factor of 1,000.
      // n=1 (Million), n=2 (Billion), n=3 (Trillion), etc.
      const tier = Math.floor((absNum.toString().length - 1) / 3);
      
      // 4. Generate the Unit Name (Latin Prefix Logic)
      let unitName = "";
      if (tier === 1) unitName = "M";
      else if (tier === 2) unitName = "B";
      else if (tier === 3) unitName = "T";
      else {
        const units = ["", "un", "duo", "tre", "quattuor", "quin", "sex", "septen", "octo", "novem"];
        const tens = ["", "deci", "viginti", "triginta", "quadraginta", "quinquaginta", "sexaginta", "septuaginta", "octoginta", "nonaginta"];
        const hundreds = ["", "centi", "ducenti", "trecenti", "quadringenti", "quingenti", "sescenti", "septingenti", "octingenti", "nongenti"];
    
        const i = tier - 1;
        const u = i % 10;
        const t = Math.floor(i / 10) % 10;
        const h = Math.floor(i / 100) % 10;
    
        // Special case for the "Quadrillion" through "Nonillion" range
        const simpleNames = { 4: "Quadrillion", 5: "Quintillion", 6: "Sextillion", 7: "Septillion", 8: "Octillion", 9: "Nonillion", 10: "Decillion" };
        
        if (simpleNames[tier]) {
          unitName = simpleNames[tier];
        } else {
          // Construct name: [Unit][Ten][Hundred] + "llion"
          let constructed = units[u] + tens[t] + hundreds[h];
          // Phonetic fix: septen -> septem, novem -> novem before certain letters
          constructed = constructed.replace(/en(v|t|d)/, 'em$1').replace(/em(d)/, 'en$1');
          unitName = constructed.charAt(0).toUpperCase() + constructed.slice(1) + "llion";
        }
      }
    
      // 5. Calculate the Coefficient (the number before the word)
      const divisor = 10n ** BigInt(tier * 3);
      const wholePart = absNum / divisor;
      const remainder = absNum % divisor;
    
      // Format whole part with commas (e.g., "2,360,718")
      let output = sign + wholePart.toLocaleString('en-US');
    
      // 6. Handle Decimals manually (BigInt doesn't do floats)
      if (decimalPlaces > 0) {
        const precision = 10n ** BigInt(decimalPlaces);
        const fractionalPart = (remainder * precision) / divisor;
        if (fractionalPart > 0n) {
          // Pad and trim trailing zeros for a clean look (e.g., .5 instead of .50)
          const formattedDec = fractionalPart.toString().padStart(decimalPlaces, '0').replace(/0+$/, '');
          output += "." + formattedDec;
        }
      }
    
      // 7. Final assembly
      const space = unitName.length > 1 ? " " : "";
      return output + space + unitName;
    }
    
    // Procedural Noise Functions
    function hashString(str) {
      let hash = 0;
      for (let i = 0; i < str.length; i++) {
        hash = ((hash << 5) - hash) + str.charCodeAt(i);
        hash |= 0;
      }
      return hash;
    }

    function hash(n) {
      let h = Math.sin(n * 12.9898 + 78.233) * 43758.5453123;
      return (h - Math.floor(h)) * 2.0 - 1.0;
    }

    function lerp(a, b, t) {
      return a + t * (b - a);
    }

    function noise1D(x) {
      const i = Math.floor(x);
      const f = x - i;
      const u = f * f * (3.0 - 2.0 * f);
      return lerp(hash(i), hash(i + 1), u);
    }

    function fbm(x, octaves) {
      let v = 0;
      let a = 0.5;
      let shift = 100.0;
      for (let i = 0; i < octaves; ++i) {
        v += a * noise1D(x);
        x = x * 2.0 + shift;
        a *= 0.5;
      }
      return v;
    }

    let globalMarketState = {
      crashMultiplier: 1.0,
      nextCrashTime: Date.now() + (10 + Math.random() * 10) * 60 * 1000
    };

    function calculateStockPrice(stock, timeMs) {
      const timeSec = timeMs / 1000;
      const seed = hashString(stock.symbol);
      const noiseTime = timeSec * 0.05 + seed;
      const noiseVal = fbm(noiseTime, 4);

      // 1. Remove the old 'drift = 1 + timeSec' line entirely.

      // 2. Add a constant 'bias' here (e.g., 0.15).
      // This shifts the random wave so it's centered slightly positive.
      const bias = 0.15;
      const fluctuation = Math.exp((noiseVal + bias) * stock.volatility * 3);

      // 3. Return the price without the time-based multiplier.
      return stock.initialPrice * fluctuation * globalMarketState.crashMultiplier;
    }

    // Load saved game or initialize
    const savedState = localStorage.getItem('stocksim_game_save');
    let loadedState = null;
    if (savedState) {
      try {
        loadedState = JSON.parse(savedState);
        userBalance = loadedState.userBalance !== undefined ? loadedState.userBalance : 10000;
        userDebt = loadedState.userDebt !== undefined ? loadedState.userDebt : 0;
        creditScore = loadedState.creditScore !== undefined ? loadedState.creditScore : 750;
        if (loadedState.stocksOwned) stocksOwned = loadedState.stocksOwned;
        if (loadedState.stockPurchasePrices) stockPurchasePrices = loadedState.stockPurchasePrices;
        if (loadedState.globalMarketState) globalMarketState = loadedState.globalMarketState;
        if (loadedState.activeLoan !== undefined) activeLoan = loadedState.activeLoan;
      } catch (e) {
        console.error("Error loading save", e);
      }
    }

    [...growthStocks, ...stableStocks, ...cryptoStocks].forEach(stock => {
      stock.initialPrice = stock.price;

      // We overwrite history using the current time so it progresses seamlessly while offline
      stock.history = Array(20).fill(0).map((_, i) => {
        const timeOffset = Date.now() - (19 - i) * 5000;
        const p = calculateStockPrice(stock, timeOffset);
        return { time: timeOffset, price: p };
      });
      stock.price = stock.history[19].price;
      stock.change = stock.history[19].price - stock.history[18].price;

      if (stocksOwned[stock.symbol] === undefined) stocksOwned[stock.symbol] = 0;
      if (stockPurchasePrices[stock.symbol] === undefined) stockPurchasePrices[stock.symbol] = 0;
    });

    function saveGame() {
      const gameState = {
        userBalance,
        userDebt,
        creditScore,
        stocksOwned,
        stockPurchasePrices,
        globalMarketState,
        activeLoan,
        stocks: {}
      };

      [...growthStocks, ...stableStocks, ...cryptoStocks].forEach(stock => {
        gameState.stocks[stock.symbol] = {
          price: stock.price,
          change: stock.change,
          history: stock.history
        };
      });

      localStorage.setItem('stocksim_game_save', JSON.stringify(gameState));
    }

    function updateMarketCrash() {
      const now = Date.now();
      if (now >= globalMarketState.nextCrashTime && globalMarketState.crashMultiplier >= 1.0) {
        globalMarketState.crashMultiplier = 0.3 + Math.random() * 0.4;
        globalMarketState.nextCrashTime = now + (10 + Math.random() * 10) * 60 * 1000;
        console.log("Market Crash! Next one at " + new Date(globalMarketState.nextCrashTime));

        const toast = document.getElementById('crash-toast');
        if (toast) {
          toast.classList.add('show');
          setTimeout(() => {
            toast.classList.remove('show');
          }, 5000);
        }
      }

      if (globalMarketState.crashMultiplier < 1.0) {
        globalMarketState.crashMultiplier += 0.01;
        if (globalMarketState.crashMultiplier > 1.0) {
          globalMarketState.crashMultiplier = 1.0;
        }
      }
    }

    function updateStockPrice(stock) {
      const oldPrice = stock.price;

      // REMOVED: The old "gain = 0.1 + Math.random() * 9.9" logic is gone.
      stock.price = calculateStockPrice(stock, Date.now());

      stock.change = stock.price - oldPrice;
      stock.history.push({ time: Date.now(), price: stock.price });
      if (stock.history.length > 20) stock.history.shift();
    }

    function renderStockCard(stock) {
      const owned = stocksOwned[stock.symbol] || 0;
      const purchasePrice = stockPurchasePrices[stock.symbol];
      const profitLoss = owned > 0 ? ((stock.price - purchasePrice) / purchasePrice) * 100 : 0;

      return `
        <div class="stock-card" id="card-${stock.symbol}">
          <div class="stock-header">
            <h3>${stock.symbol}</h3>
            <span>${stock.name}</span>
          </div>
          <div class="stock-price">$${stock.price.toFixed(2)}</div>
          <div class="stock-change ${stock.change >= 0 ? 'positive' : 'negative'}">
            ${stock.change >= 0 ? '▲' : '▼'} $${Math.abs(stock.change).toFixed(2)}
          </div>
          <div class="stock-owned">
            Owned: ${formatMassiveNumber(owned)}
            ${owned > 0 ? ` (${profitLoss >= 0 ? '+' : ''}${profitLoss.toFixed(2)}%)` : ''}
          </div>
          <div class="chart-container">
            <canvas class="stock-chart" id="chart-${stock.symbol}"></canvas>
          </div>
          <div class="stock-actions">
            <div class="action-group">
              <button class="buy-btn" onclick="buyStock('${stock.symbol}')">Buy</button>
              <button class="buy-btn max-btn" onclick="buyMaxStock('${stock.symbol}')">Max</button>
            </div>
            <div class="action-group">
              <button class="sell-btn max-btn" onclick="sellMaxStock('${stock.symbol}')">Max</button>
              <button class="sell-btn" onclick="sellStock('${stock.symbol}')">Sell</button>
            </div>
          </div>
        </div>
      `;
    }

    function updateChart(stock) {
      const ctx = document.getElementById(`chart-${stock.symbol}`).getContext('2d');

      if (charts[stock.symbol]) {
        charts[stock.symbol].destroy();
      }

      charts[stock.symbol] = new Chart(ctx, {
        type: 'line',
        data: {
          labels: stock.history.map((h, i) => i),
          datasets: [{
            data: stock.history.map(h => h.price),
            borderColor: '#4CAF50',
            tension: 0.4,
            borderWidth: 2,
            pointRadius: 0
          }]
        },
        options: {
          responsive: true,
          maintainAspectRatio: false,
          plugins: { legend: { display: false } },
          scales: {
            x: { display: false },
            y: { display: false }
          },
          animation: false
        }
      });
    }

    function renderStocks() {
      if (currentTab === 'gambling') return; // Do not overwrite gambling tab

      let stocks = [];
      if (currentTab === 'growth') stocks = growthStocks;
      else if (currentTab === 'stable') stocks = stableStocks;
      else if (currentTab === 'crypto') stocks = cryptoStocks;

      const container = document.getElementById(`${currentTab}-stocks`);

      // Store scroll position
      const scrollPos = window.scrollY;

      // Update container HTML
      container.innerHTML = stocks.map(stock => renderStockCard(stock)).join('');

      // Restore scroll position
      window.scrollTo(0, scrollPos);

      // Update charts
      stocks.forEach(stock => updateChart(stock));
    }

    function updateStocks() {
      updateMarketCrash();

      // Update ALL stocks so background tabs stay accurate
      [...growthStocks, ...stableStocks, ...cryptoStocks].forEach(updateStockPrice);

      // Add 0.025% interest to user balance
      userBalance += userBalance * 0.000000025;

      renderStocks();
      updateUserInfo();
      saveGame();
    }

    function buyStock(symbol, amount = null) {
      const stock = [...growthStocks, ...stableStocks, ...cryptoStocks].find(s => s.symbol === symbol);
      if (amount === null) amount = parseFloat(prompt(`Enter the amount to invest in ${symbol}:`, '100'));

      if (isNaN(amount) || amount <= 0) {
        alert("Invalid amount!");
        return;
      }

      if (amount > userBalance + 0.01) {
        alert("Insufficient funds!");
        return;
      }

      amount = Math.min(amount, userBalance);

      const sharesBought = amount / stock.price;
      userBalance -= amount;
      stocksOwned[symbol] = (stocksOwned[symbol] || 0) + sharesBought;

      if (stockPurchasePrices[symbol] === 0) {
        stockPurchasePrices[symbol] = stock.price;
      } else {
        // Update average purchase price
        const totalShares = stocksOwned[symbol];
        const totalCost = stockPurchasePrices[symbol] * (totalShares - sharesBought) + amount;
        stockPurchasePrices[symbol] = totalCost / totalShares;
      }

      updateUserInfo();
      renderStocks();
      saveGame();
    }

    function sellStock(symbol, amount = null) {
      const stock = [...growthStocks, ...stableStocks, ...cryptoStocks].find(s => s.symbol === symbol);
      const maxShares = stocksOwned[symbol] || 0;

      if (maxShares === 0) {
        alert("You don't own any shares!");
        return;
      }

      if (amount === null) amount = parseFloat(prompt(`Enter the number of shares to sell (max ${maxShares.toFixed(4)}):`, maxShares.toFixed(4)));

      if (isNaN(amount) || amount <= 0 || amount > maxShares + 0.0001) {
        alert("Invalid number of shares!");
        return;
      }

      amount = Math.min(amount, maxShares);

      const saleAmount = amount * stock.price;
      userBalance += saleAmount;
      stocksOwned[symbol] -= amount;

      if (stocksOwned[symbol] < 0.0001) {
        stocksOwned[symbol] = 0;
        stockPurchasePrices[symbol] = 0;
      }

      updateUserInfo();
      renderStocks();
      saveGame();
    }

    function buyMaxStock(symbol) {
      buyStock(symbol, userBalance);
    }

    function sellMaxStock(symbol) {
      const stock = [...growthStocks, ...stableStocks, ...cryptoStocks].find(s => s.symbol === symbol);
      sellStock(symbol, stocksOwned[symbol]);
    }

    function updateUserInfo() {
      document.getElementById('user-balance').textContent = formatMassiveNumber(userBalance);
      document.getElementById('user-debt').textContent = formatMassiveNumber(userDebt);

      // Calculate total value of stock portfolio
      let totalStockValue = 0;
      const allStocks = [...growthStocks, ...stableStocks, ...cryptoStocks];

      allStocks.forEach(stock => {
        const shares = stocksOwned[stock.symbol] || 0;
        totalStockValue += shares * stock.price;
      });

      // Net worth = Cash + Stock Value - Debt
      const netWorth = userBalance + totalStockValue - userDebt;
      document.getElementById('total-balance').textContent = formatMassiveNumber(netWorth)

      document.getElementById('credit-score').textContent = creditScore;
    }

    // Tab switching
    document.querySelectorAll('.tab-button').forEach(button => {
      button.addEventListener('click', () => {
        document.querySelectorAll('.tab-button').forEach(btn => btn.classList.remove('active'));
        button.classList.add('active');
        document.getElementById('growth-stocks').style.display = 'none';
        document.getElementById('stable-stocks').style.display = 'none';
        document.getElementById('crypto-stocks').style.display = 'none';
        document.getElementById('gambling-stocks').style.display = 'none';
        currentTab = button.dataset.tab;
        const container = document.getElementById(`${currentTab}-stocks`);
        if (currentTab === 'gambling') {
          container.style.display = 'block';
        } else {
          container.style.display = 'grid';
          renderStocks();
        }
      });
    });

    // Initial render
    renderStocks();

    // Update prices every 5 seconds
    setInterval(updateStocks, 5000);

    // Settings and Theme logic
    const settingsBtn = document.getElementById('settings-btn');
    const settingsMenu = document.getElementById('settings-menu');
    const themeToggle = document.getElementById('theme-toggle');
    const gamblingToggle = document.getElementById('gambling-toggle');
    const gamblingTabBtn = document.getElementById('gambling-tab-btn');
    const resetSettingsBtn = document.getElementById('reset-settings-btn');
    const clearCacheBtn = document.getElementById('clear-cache-btn');

    // Load settings from localStorage
    const savedSettings = JSON.parse(localStorage.getItem('stocksim_settings') || '{}');
    if (savedSettings.darkMode) {
      document.body.classList.add('dark-mode');
      themeToggle.checked = true;
    }
    if (savedSettings.gamblingEnabled) {
      gamblingToggle.checked = true;
      gamblingTabBtn.style.display = 'inline-block';
    }

    settingsBtn.addEventListener('click', () => {
      settingsMenu.classList.toggle('show');
    });

    document.addEventListener('click', (e) => {
      if (!settingsBtn.contains(e.target) && !settingsMenu.contains(e.target)) {
        settingsMenu.classList.remove('show');
      }
      if (typeof bankBtn !== 'undefined' && !bankBtn.contains(e.target) && !bankMenu.contains(e.target)) {
        bankMenu.classList.remove('show');
      }
    });

    themeToggle.addEventListener('change', (e) => {
      const isDarkMode = e.target.checked;
      if (isDarkMode) {
        document.body.classList.add('dark-mode');
      } else {
        document.body.classList.remove('dark-mode');
      }

      const currentSettings = JSON.parse(localStorage.getItem('stocksim_settings') || '{}');
      currentSettings.darkMode = isDarkMode;
      localStorage.setItem('stocksim_settings', JSON.stringify(currentSettings));
    });

    gamblingToggle.addEventListener('change', (e) => {
      const isEnabled = e.target.checked;
      if (isEnabled) {
        gamblingTabBtn.style.display = 'inline-block';
      } else {
        gamblingTabBtn.style.display = 'none';
        if (currentTab === 'gambling') {
          document.querySelector('.tab-button[data-tab="growth"]').click();
        }
      }

      const currentSettings = JSON.parse(localStorage.getItem('stocksim_settings') || '{}');
      currentSettings.gamblingEnabled = isEnabled;
      localStorage.setItem('stocksim_settings', JSON.stringify(currentSettings));
    });

    resetSettingsBtn.addEventListener('click', () => {
      if (confirm('Are you sure you want to reset settings to default?')) {
        localStorage.removeItem('stocksim_settings');
        document.body.classList.remove('dark-mode');
        themeToggle.checked = false;

        gamblingToggle.checked = false;
        gamblingTabBtn.style.display = 'none';
        if (currentTab === 'gambling') {
          document.querySelector('.tab-button[data-tab="growth"]').click();
        }

        settingsMenu.classList.remove('show');
      }
    });

    clearCacheBtn.addEventListener('click', () => {
      if (confirm('Are you sure you want to clear the game cache? This will reset all your progress!')) {
        // Clear game cache
        localStorage.removeItem('stocksim_game_save');

        // Reset to initial values
        userBalance = 10000;
        userDebt = 0;
        creditScore = 750;
        activeLoan = null;

        [...growthStocks, ...stableStocks, ...cryptoStocks].forEach(stock => {
          stocksOwned[stock.symbol] = 0;
          stockPurchasePrices[stock.symbol] = 0;
        });

        updateUserInfo();
        renderStocks();
        settingsMenu.classList.remove('show');
        alert('Game cache cleared! Progress has been reset.');
      }
    });

    // Bank & Debt Logic
    const bankBtn = document.getElementById('bank-btn');
    const bankMenu = document.getElementById('bank-menu');
    const bankMessage = document.getElementById('bank-message');
    const requestLoanBtn = document.getElementById('request-loan-btn');
    const payDebtBtn = document.getElementById('pay-debt-btn');

    bankBtn.addEventListener('click', () => {
      document.getElementById('bank-credit-score').textContent = creditScore;
      bankMessage.textContent = '';
      bankMenu.classList.toggle('show');
    });

    requestLoanBtn.addEventListener('click', () => {
      const amount = parseFloat(document.getElementById('loan-amount-input').value);
      if (isNaN(amount) || amount <= 0) {
        bankMessage.style.color = "#dc3545";
        bankMessage.textContent = "Invalid amount.";
        return;
      }

      if (activeLoan || userDebt > 0) {
        bankMessage.style.color = "#dc3545";
        bankMessage.textContent = "You already have active debt!";
        return;
      }

      const maxLoan = Math.max(0, Math.floor(creditScore * (10000 / 750) / 100) * 100);
      if (amount > maxLoan) {
        bankMessage.style.color = "#dc3545";
        bankMessage.textContent = `Denied. Max loan is $${maxLoan}.`;
        return;
      }

      const interest = amount * 0.025; // 2.5% interest
      const totalOwed = amount + interest;

      userBalance += amount;
      userDebt += totalOwed;

      // Dynamic loan duration based on loan amount and credit score
      // A $10,000 loan with a 750 credit score gives exactly 180 seconds (3 minutes)
      const timeToPay = Math.floor(60 + (amount / 10000) * 60 + (creditScore / 750) * 60);

      activeLoan = {
        amount: totalOwed,
        originalAmount: totalOwed,
        dueDate: Date.now() + timeToPay * 1000,
        lastPenaltyTime: Date.now()
      };

      bankMessage.style.color = "#28a745";
      bankMessage.textContent = `Accepted! Total owed: $${totalOwed.toFixed(2)}. You have ${timeToPay}s to pay it back.`;

      updateUserInfo();
      saveGame();
      updateDebtTimer();
    });

    payDebtBtn.addEventListener('click', () => {
      if (userBalance >= userDebt && userDebt > 0) {
        userBalance -= userDebt;

        if (activeLoan) {
          const now = Date.now();
          if (now <= activeLoan.dueDate) {
            creditScore += 20; // boost score for paying on time
            if (creditScore > 1000) creditScore = 1000;
          }
        }

        userDebt = 0;
        activeLoan = null;
        updateUserInfo();
        saveGame();
        updateDebtTimer();
      } else {
        alert("Not enough balance to pay off your debt completely.");
      }
    });

    function updateDebtTimer() {
      const card = document.getElementById('debt-timer-card');
      if (!activeLoan) {
        card.classList.remove('show');
        return;
      }
      card.classList.add('show');

      const now = Date.now();
      let timeLeft = Math.floor((activeLoan.dueDate - now) / 1000);

      if (timeLeft <= 0) {
        timeLeft = 0;
        document.getElementById('debt-time-left').style.color = "#dc3545";

        // Auto-sell and resolve if 60 seconds late
        if (now - activeLoan.dueDate > 60 * 1000) {
          [...growthStocks, ...stableStocks, ...cryptoStocks].forEach(stock => {
            if (stocksOwned[stock.symbol] > 0) {
              userBalance += stocksOwned[stock.symbol] * stock.price;
              stocksOwned[stock.symbol] = 0;
              stockPurchasePrices[stock.symbol] = 0;
            }
          });

          if (userBalance >= userDebt) {
            userBalance -= userDebt;
            userDebt = 0;
            activeLoan = null;
            creditScore = 300;
            alert("The bank auto-sold your stocks to pay your debt. Your credit score has plummeted!");
          } else {
            userBalance = 10;
            userDebt = 0;
            activeLoan = null;
            creditScore = 300;
            alert("You defaulted on your loan! The bank auto-sold your stocks and seized your assets, leaving you with $10.");
          }

          updateUserInfo();
          renderStocks();
          saveGame();

          document.getElementById('debt-timer-card').classList.remove('show');
          return;
        }

        // Apply late penalty every second
        if (now - activeLoan.lastPenaltyTime >= 1000) {
          // Terrible late fees: 1% of original debt per second
          userDebt += activeLoan.originalAmount * 0.01;
          activeLoan.amount = userDebt;

          // Decrease credit score
          creditScore -= 2;
          if (creditScore < 300) creditScore = 300;

          activeLoan.lastPenaltyTime = now;
          updateUserInfo();
          saveGame();
        }
      } else {
        document.getElementById('debt-time-left').style.color = "inherit";
      }

      const debtAmountDisplay = document.getElementById('debt-amount-display');
      debtAmountDisplay.textContent = userDebt.toFixed(2);
      if (userDebt > userBalance) {
        debtAmountDisplay.style.color = "#dc3545";
      } else {
        debtAmountDisplay.style.color = "inherit";
      }

      document.getElementById('debt-time-left').textContent = timeLeft;
    }

    setInterval(updateDebtTimer, 1000);
    // Initialize timer state on load
    updateDebtTimer();

    // Roulette Logic
    let currentRotation = 0;

    function drawWheel() {
      const canvas = document.getElementById('roulette-wheel');
      const ctx = canvas.getContext('2d');
      const centerX = canvas.width / 2;
      const centerY = canvas.height / 2;
      const radius = centerX;
      const arc = Math.PI * 2 / 37;

      for (let i = 0; i < 37; i++) {
        ctx.beginPath();
        if (i === 0) ctx.fillStyle = '#28a745'; // Green
        else if (i % 2 === 0) ctx.fillStyle = '#343a40'; // Black
        else ctx.fillStyle = '#dc3545'; // Red

        ctx.moveTo(centerX, centerY);
        ctx.arc(centerX, centerY, radius, i * arc, (i + 1) * arc);
        ctx.fill();
        ctx.stroke();

        // Draw text
        ctx.save();
        ctx.translate(centerX, centerY);
        ctx.rotate(i * arc + arc / 2);
        ctx.textAlign = 'right';
        ctx.fillStyle = 'white';
        ctx.font = 'bold 12px monospace';
        ctx.fillText(i, radius - 10, 4);
        ctx.restore();
      }
    }
    drawWheel();

    function playRoulette(betColor) {
      const betInput = document.getElementById('roulette-bet');
      const resultDiv = document.getElementById('roulette-result');
      const amount = parseFloat(betInput.value);

      if (isNaN(amount) || amount <= 0) {
        resultDiv.style.color = "#dc3545";
        resultDiv.textContent = "Please enter a valid bet amount.";
        return;
      }

      if (amount > userBalance) {
        resultDiv.style.color = "#dc3545";
        resultDiv.textContent = "Insufficient funds!";
        return;
      }

      // Deduct bet amount
      userBalance -= amount;

      const roll = Math.floor(Math.random() * 37);
      let outcomeColor = '';
      if (roll === 0) outcomeColor = 'green';
      else if (roll % 2 === 0) outcomeColor = 'black';
      else outcomeColor = 'red';

      resultDiv.textContent = "Spinning...";
      resultDiv.style.color = "inherit";

      const sliceAngle = 360 / 37;
      const targetRotationOffset = -90 - (roll * sliceAngle + sliceAngle / 2);
      const randomJitter = (Math.random() - 0.5) * (sliceAngle * 0.8);

      currentRotation += 360 * 5; // 5 extra spins
      let targetPos = (targetRotationOffset + randomJitter) % 360;
      if (targetPos < 0) targetPos += 360;
      let currentPos = currentRotation % 360;
      if (currentPos < 0) currentPos += 360;
      let diff = targetPos - currentPos;
      if (diff < 0) diff += 360;
      currentRotation += diff;

      document.getElementById('roulette-wheel').style.transform = `rotate(${currentRotation}deg)`;

      const btns = [document.getElementById('bet-red-btn'), document.getElementById('bet-black-btn'), document.getElementById('bet-green-btn')];
      btns.forEach(b => b.disabled = true);

      setTimeout(() => {
        let winnings = 0;
        if (betColor === outcomeColor) {
          winnings = (betColor === 'green') ? amount * 1000 : amount * 2;
          userBalance += winnings;
          resultDiv.style.color = "#28a745";
          resultDiv.textContent = `Landed on ${outcomeColor.toUpperCase()} (Roll: ${roll})! You won $${winnings.toFixed(2)}!`;
        } else {
          resultDiv.style.color = "#dc3545";
          resultDiv.textContent = `Landed on ${outcomeColor.toUpperCase()} (Roll: ${roll}). You lost $${amount.toFixed(2)}.`;
        }
        btns.forEach(b => b.disabled = false);
        updateUserInfo();
        saveGame();
      }, 3000);

      updateUserInfo();
    }

    document.getElementById('bet-red-btn').addEventListener('click', () => playRoulette('red'));
    document.getElementById('bet-black-btn').addEventListener('click', () => playRoulette('black'));
    document.getElementById('bet-green-btn').addEventListener('click', () => playRoulette('green'));
  </script>
</body>

</html>
